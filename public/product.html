<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Product</title>
  </head>
  <body>
    <form
      action="/api/v1/products?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhMTJlY2U5ODljOGU0YjdjY2E4MjI5YyIsInRva2VuVmVyc2lvbiI6MCwiaWF0IjoxNzgwODQ2MDM1LCJleHAiOjE4MTIzODIwMzV9.dzo17k0FnYxi_FOb9SUtoq05UpJcND5XPvx-IUMSKAI"
      method="POST"
      enctype="multipart/form-data"
    >
      <input
        type="text"
        name="name"
        placeholder="Product Name"
        required
      /><br /><br />
      <input
        type="text"
        name="description"
        placeholder="Product Description"
        required
      />
      <br /><br />
      <input
        type="number"
        name="price"
        placeholder="Price"
        required
      /><br /><br />
      <input
        type="number"
        name="stock"
        placeholder="Stock"
        required
      /><br /><br />
      <input
        type="file"
        name="image"
        accept="image/*"
        placeholder="Image"
        required
      /><br /><br />
      <button type="submit">Create Product</button>
    </form>
  </body>
</html>
