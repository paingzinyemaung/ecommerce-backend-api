<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
  </head>
  <body>
    <nav>
      <!-- <a href="login.html">Login</a> -->
      <h1>Register Page</h1>
      <div class="message"></div>
      <br />
      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required /><br /><br />
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          required
        /><br /><br />
        <label for="confirmPassword">Confirm Password:</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          required
        /><br /><br />
        <button onclick="onSubmit()">Register</button>
      </div>
    </nav>

    <!-- script -->
    <script>
      async function onSubmit() {
        const email = document.querySelector("#email").value;
        const password = document.querySelector("#password").value;
        const confirmPassword =
          document.querySelector("#confirmPassword").value;
        const message = document.querySelector(".message");
        // console.log(email, password, confirmPassword);

        if (password !== confirmPassword) {
          //   alert("Passwords do not match");
          message.textContent = "Passwords do not match";
          return;
        }

        try {
          const response = await fetch("api/v1/auth/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization:
                "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhMGU3YTkzZTY0MWJjMDU4MmE1YTU3ZiIsImlhdCI6MTc3OTU0MzQ3MywiZXhwIjoxODExMDc5NDczfQ.FLswTEMjW1gkU0V-ABl0yVSU5p-ZAHeUGRQ0_56aOHk",
            },
            body: JSON.stringify({ email, password }),
          });
          const data = await response.json();
          if (response.ok) {
            message.textContent = "Registration successful!";
          } else {
            // console.log(data);
            message.textContent = data.message || "Registration failed";
          }
        } catch (e) {
          console.log("Error registering user: ", e.data);
        }
      }
    </script>
  </body>
</html>
